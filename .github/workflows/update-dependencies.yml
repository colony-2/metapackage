name: Update Dependencies

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: update-dependencies-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    name: Check latest dependency versions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure npm registry
        run: npm config set registry https://registry.npmjs.org/

      - name: Update dependency versions
        id: update
        run: node scripts/update-dependencies.mjs

      - name: Commit dependency updates
        if: steps.update.outputs.changed == 'true'
        run: |
          set -euo pipefail

          if git diff --quiet -- package.json; then
            echo "Updater reported changes, but package.json is clean."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: update dependency versions"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Dispatch release workflow
        if: steps.update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run release.yml --ref "${GITHUB_REF_NAME}" -f source=dependency-update
