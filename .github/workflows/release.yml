name: Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Bump, tag, publish, and release
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'github-actions[bot]' && (github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Show npm version
        run: |
          npm --version
          npm config set registry https://registry.npmjs.org/

      - name: Bump patch version and tag
        id: version
        run: |
          set -euo pipefail
          npm version patch --no-git-tag-version
          version="$(node -p "require('./package.json').version")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          git add package.json
          git commit -m "chore(release): v${version} [skip ci]"
          git tag "v${version}"

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Push version commit and tag
        run: git push origin "HEAD:${GITHUB_REF_NAME}" --follow-tags

      - name: Publish to npm
        run: npm publish --access public

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "@colony/c2 v${{ steps.version.outputs.version }}" \
            --generate-notes \
            --verify-tag
